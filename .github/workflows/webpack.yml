import 'dart:convert';
import 'package:flutter/material.dart';
import 'package:http/http.dart' as http;

void main() {
  runApp(const GoranAI());
}

class GoranAI extends StatelessWidget {
  const GoranAI({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      debugShowCheckedModeBanner: false,
      theme: ThemeData(
        brightness: Brightness.dark,
        scaffoldBackgroundColor: const Color(0xFF0B1222),
        primaryColor: const Color(0xFF1E293B),
      ),
      home: const ChatScreen(),
    );
  }
}

class ChatMessage {
  final String role;
  final String text;
  ChatMessage({required this.role, required this.text});
}

class ChatScreen extends StatefulWidget {
  const ChatScreen({super.key});

  @override
  State<ChatScreen> createState() => _ChatScreenState();
}

class _ChatScreenState extends State<ChatScreen> {
  final List<ChatMessage> _messages = [];
  final TextEditingController _controller = TextEditingController();
  bool _isLoading = false;

  final String googleApiKey = "AIzaSyBGoKP5FDXoyc_cJQeGYTbG1xVFHRLogIs"; 

  Future<void> _sendMessage() async {
    if (_controller.text.trim().isEmpty) return;
    
    String userText = _controller.text;
    setState(() {
      _messages.add(ChatMessage(role: "user", text: userText));
      _isLoading = true;
    });
    _controller.clear();

    try {
      final response = await http.post(
        Uri.parse("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$googleApiKey"),
        headers: {"Content-Type": "application/json"},
        body: jsonEncode({
          "contents": [{"parts": [{"text": userText}]}]
        }),
      );

      if (response.statusCode == 200) {
        final data = jsonDecode(utf8.decode(response.bodyBytes));
        String aiReply = data["candidates"][0]["content"]["parts"][0]["text"];
        setState(() => _messages.add(ChatMessage(role: "assistant", text: aiReply)));
      } else {
        setState(() => _messages.add(ChatMessage(role: "assistant", text: "هەڵەیەک لە پەیوەندی سێرڤەر هەیە.")));
      }
    } catch (e) {
      setState(() => _messages.add(ChatMessage(role: "assistant", text: "پەیوەندی ئینتەرنێت نییە!")));
    } finally {
      setState(() => _isLoading = false);
    }
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        backgroundColor: Colors.transparent,
        elevation: 0,
        leading: const Icon(Icons.smart_toy_rounded, color: Color(0xFF3B82F6), size: 30),
        title: const Text("Goran AI"),
      ),
      body: Column(
        children: [
          Expanded(
            child: _messages.isEmpty
                ? _buildEmptyState()
                : ListView.builder(
                    padding: const EdgeInsets.all(15),
                    itemCount: _messages.length,
                    itemBuilder: (context, index) => _buildMessageBubble(_messages[index]),
                  ),
          ),
          if (_isLoading) const LinearProgressIndicator(color: Colors.blue),
          _buildInputArea(),
          const Text("Powered by Gemini AI • Goran AI v1.0", style: TextStyle(color: Colors.grey, fontSize: 10)),
          const SizedBox(height: 10),
        ],
      ),
    );
  }

  Widget _buildEmptyState() {
    return Center(
      child: Column(
        mainAxisAlignment: MainAxisAlignment.center,
        children: [
          Icon(Icons.smart_toy_outlined, size: 80, color: Colors.white.withOpacity(0.1)),
          const Text("چۆن دەتوانم یارمەتیت بدەم؟", style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
          const Text("من زیرەکی دەستکردی گۆرانم.", style: TextStyle(color: Colors.grey)),
        ],
      ),
    );
  }

  Widget _buildMessageBubble(ChatMessage msg) {
    bool isUser = msg.role == "user";
    return Align(
      alignment: isUser ? Alignment.centerRight : Alignment.centerLeft,
      child: Container(
        padding: const EdgeInsets.all(12),
        margin: const EdgeInsets.symmetric(vertical: 5),
        decoration: BoxDecoration(
          color: isUser ? const Color(0xFF2563EB) : const Color(0xFF1E293B),
          borderRadius: BorderRadius.circular(15),
        ),
        child: Text(msg.text, style: const TextStyle(color: Colors.white)),
      ),
    );
  }

  Widget _buildInputArea() {
    return Padding(
      padding: const EdgeInsets.all(16.0),
      child: Row(
        children: [
          Expanded(
            child: TextField(
              controller: _controller,
              textAlign: TextAlign.right,
              decoration: InputDecoration(
                hintText: "نامەیەک بنووسە...",
                filled: true,
                fillColor: const Color(0xFF1E293B),
                border: OutlineInputBorder(borderRadius: BorderRadius.circular(15), borderSide: BorderSide.none),
              ),
            ),
          ),
          const SizedBox(width: 10),
          CircleAvatar(
            backgroundColor: const Color(0xFF2563EB),
            child: IconButton(icon: const Icon(Icons.send, color: Colors.white), onPressed: _sendMessage),
          ),
        ],
      ),
    );
  }
}

